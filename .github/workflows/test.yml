name: Test
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: marler8997/setup-anyzig@master
      - run: zig build test install --summary all
      - run: zig build examples -Dautoexit --summary all
        if: runner.os == 'Windows'
      - run: zig build test --summary all
        working-directory: 0.14.1
      - run: zig build examples -Dautoexit --summary all
        working-directory: 0.14.1
        if: runner.os == 'Windows'
