name: Test
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Pin macOS to macos-15; macos-latest's Xcode 26.4 SDK doesn't link
        # with Zig 0.15.2 (ziglang/zig#31658), fixed in later Zig versions.
        os: [windows-latest, windows-11-arm, ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: marler8997/setup-anyzig@master
      - run: zig build test install --summary all
      - run: zig build examples -Dautoexit --summary all
        if: runner.os == 'Windows'
      - run: zig build test --summary all
        working-directory: 0.14.1
      - run: zig build examples -Dautoexit --summary all
        working-directory: 0.14.1
        if: runner.os == 'Windows'
      - run: zig build test --summary all
        working-directory: 0.16.0
      - run: zig build examples -Dautoexit --summary all
        working-directory: 0.16.0
        if: runner.os == 'Windows'
